<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner ENEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #f1c40f; }
        .user-area {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-area input, .user-area button {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
        }
        .user-area input { background: rgba(255,255,255,0.2); color: white; }
        .user-area button { background: #e63946; color: white; cursor: pointer; }
        .timer-area {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .timer-display {
            font-size: 48px;
            font-family: monospace;
            background: black;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 15px;
            margin: 10px 0;
        }
        .timer-btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .start { background: #2ecc71; color: white; }
        .pause { background: #f39c12; color: white; }
        .reset { background: #e74c3c; color: white; }
        .ranking {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .day-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
        }
        .day-header {
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #f1c40f;
            margin-bottom: 10px;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .task {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
        }
        .task.completed { background: rgba(46,204,113,0.2); border-left: 3px solid #2ecc71; }
        .task-header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .task-name { font-weight: bold; cursor: pointer; flex: 1; }
        .task-checkbox { width: 18px; height: 18px; cursor: pointer; }
        .hours-buttons button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 2px;
            cursor: pointer;
        }
        .topic {
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            margin-top: 5px;
        }
        .add-btn {
            width: 100%;
            margin-top: 10px;
            padding: 5px;
            background: rgba(255,255,255,0.2);
            border: 1px dashed white;
            border-radius: 10px;
            cursor: pointer;
        }
        .reset-all {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #e63946;
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .week-grid { grid-template-columns: 1fr; }
            .timer-display { font-size: 32px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Planner ENEM Medicina</h1>

    <div class="user-area">
        <input type="text" id="userName" placeholder="Seu nome">
        <button id="loginBtn">Entrar</button>
        <span id="userDisplay" style="background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 25px;">Nenhum usuário</span>
    </div>

    <div class="ranking" id="rankingArea" style="display: none;">
        <h3>🏆 Ranking</h3>
        <div id="rankingList">Carregando...</div>
    </div>

    <div class="timer-area">
        <h3>⏱️ Timer</h3>
        <div class="timer-display" id="timer">00:00:00</div>
        <div id="currentSubject" style="margin: 10px 0;">📖 Nenhuma matéria</div>
        <button class="timer-btn start" id="startTimer">▶ Iniciar</button>
        <button class="timer-btn pause" id="pauseTimer">⏸ Pausar</button>
        <button class="timer-btn reset" id="resetTimer">⏹ Zerar</button>
    </div>

    <div id="weekGrid" class="week-grid"></div>

    <button class="reset-all" id="resetWeek">🔄 Resetar Semana</button>
</div>

<script>
    // Cronograma completo
    const schedule = {
        seg: { name: "SEG", tasks: [
            { name: "Matemática", duration: "1h🔥", badge: "Crítica" },
            { name: "Biologia", duration: "1h🔥", badge: "Crítica" },
            { name: "Português", duration: "1h✨", badge: "Alta" }
        ]},
        ter: { name: "TER", tasks: [
            { name: "Química", duration: "1h🔥", badge: "Crítica" },
            { name: "Física", duration: "1h🔥", badge: "Alta" },
            { name: "Matemática", duration: "1h✨", badge: "Crítica" }
        ]},
        qua: { name: "QUA", tasks: [
            { name: "História", duration: "45min✨", badge: "Média" },
            { name: "Geografia", duration: "45min✨", badge: "Média" },
            { name: "Matemática", duration: "1h30✨", badge: "Crítica" }
        ]},
        qui: { name: "QUI", tasks: [
            { name: "Redação", duration: "1h30🔥", badge: "Crítica" },
            { name: "Física", duration: "45min✨", badge: "Alta" },
            { name: "Biologia", duration: "45min✨", badge: "Crítica" }
        ]},
        sex: { name: "SEX", tasks: [
            { name: "Química", duration: "1h✨", badge: "Crítica" },
            { name: "Matemática", duration: "1h🔥", badge: "Crítica" },
            { name: "Revisão", duration: "1h✨", badge: "Alta" }
        ]},
        sab: { name: "SÁB", tasks: [
            { name: "Matemática", duration: "1h🔥", badge: "Crítica" },
            { name: "Biologia", duration: "1h🔥", badge: "Crítica" },
            { name: "Química", duration: "1h🔥", badge: "Crítica" }
        ]},
        dom: { name: "DOM", tasks: [
            { name: "Redação", duration: "1h🔥", badge: "Crítica" },
            { name: "Humanas", duration: "1h✨", badge: "Média" },
            { name: "Revisão Geral", duration: "1h✨", badge: "Alta" }
        ]}
    };

    let currentUser = null;
    let weekData = {};
    let timerSeconds = 0, timerInterval = null, isRunning = false;
    let currentDay = null, currentTaskIdx = null;

    function getWeekId() {
        let now = new Date();
        let start = new Date(now.getFullYear(), 0, 1);
        let days = Math.floor((now - start) / 86400000);
        return `${now.getFullYear()}-W${Math.ceil((days + start.getDay() + 1) / 7)}`;
    }

    function initWeekData() {
        let data = {};
        for (let [key, day] of Object.entries(schedule)) {
            data[key] = {
                name: day.name,
                tasks: day.tasks.map(t => ({
                    ...t,
                    completed: false,
                    topic: "",
                    hours: 0
                }))
            };
        }
        return data;
    }

    function saveData() {
        if (currentUser) {
            let key = `planner_${currentUser}_${getWeekId()}`;
            localStorage.setItem(key, JSON.stringify(weekData));
            localStorage.setItem('ranking_update', Date.now());
        }
    }

    function loadData() {
        if (currentUser) {
            let key = `planner_${currentUser}_${getWeekId()}`;
            let saved = localStorage.getItem(key);
            if (saved) {
                weekData = JSON.parse(saved);
                return true;
            }
        }
        return false;
    }

    function updateRanking() {
        let users = {};
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key && key.startsWith('planner_')) {
                let user = key.split('_')[1];
                if (user) {
                    let data = JSON.parse(localStorage.getItem(key));
                    if (data) {
                        let total = 0;
                        for (let day of Object.values(data)) {
                            for (let task of day.tasks) {
                                total += task.hours || 0;
                            }
                        }
                        users[user] = (users[user] || 0) + total;
                    }
                }
            }
        }
        let ranking = Object.entries(users).map(([name, hours]) => ({ name, hours }));
        ranking.sort((a,b) => b.hours - a.hours);
        let html = ranking.map((r,i) => `<div class="ranking-item"><span>${i+1}. ${r.name} ${r.name === currentUser ? '👑' : ''}</span><span>${r.hours.toFixed(1)}h</span></div>`).join('');
        document.getElementById('rankingList').innerHTML = html || '<div>Nenhum usuário ainda</div>';
    }

    function renderGrid() {
        let grid = document.getElementById('weekGrid');
        grid.innerHTML = '';
        for (let [dayKey, day] of Object.entries(weekData)) {
            let completed = day.tasks.filter(t => t.completed).length;
            let card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-header">
                    <span>${day.name}</span>
                    <span>${completed}/${day.tasks.length} ✓</span>
                </div>
                ${day.tasks.map((task, idx) => `
                    <div class="task ${task.completed ? 'completed' : ''}">
                        <div class="task-header">
                            <input type="checkbox" class="task-checkbox" data-day="${dayKey}" data-idx="${idx}" ${task.completed ? 'checked' : ''}>
                            <span class="task-name" data-day="${dayKey}" data-idx="${idx}" data-timer>${task.name}</span>
                            <span>${task.duration}</span>
                            <span style="background:#e74c3c; padding:2px 6px; border-radius:12px; font-size:11px;">${task.badge}</span>
                            <button data-day="${dayKey}" data-idx="${idx}" data-delete style="background:#e74c3c; border:none; color:white; border-radius:12px; padding:2px 6px;">🗑️</button>
                        </div>
                        <div class="hours-buttons">
                            ⏱️ ${task.hours.toFixed(1)}h
                            <button data-day="${dayKey}" data-idx="${idx}" data-hours="0.5">+0.5</button>
                            <button data-day="${dayKey}" data-idx="${idx}" data-hours="1">+1</button>
                            <button data-day="${dayKey}" data-idx="${idx}" data-hours="2">+2</button>
                        </div>
                        <div class="topic" data-day="${dayKey}" data-idx="${idx}">${task.topic || "✏️ Adicionar tópico"}</div>
                    </div>
                `).join('')}
                <button class="add-btn" data-day="${dayKey}">+ Adicionar Matéria</button>
            `;
            grid.appendChild(card);
        }
        attachEvents();
        updateStats();
    }

    function attachEvents() {
        document.querySelectorAll('.task-checkbox').forEach(cb => {
            cb.onchange = () => {
                let day = cb.dataset.day, idx = parseInt(cb.dataset.idx);
                weekData[day].tasks[idx].completed = cb.checked;
                saveData();
                renderGrid();
            };
        });
        document.querySelectorAll('[data-timer]').forEach(el => {
            el.onclick = () => {
                currentDay = el.dataset.day;
                currentTaskIdx = parseInt(el.dataset.idx);
                document.getElementById('currentSubject').innerHTML = `📖 Estudando: ${weekData[currentDay].tasks[currentTaskIdx].name}`;
                startTimer();
            };
        });
        document.querySelectorAll('[data-delete]').forEach(btn => {
            btn.onclick = () => {
                let day = btn.dataset.day, idx = parseInt(btn.dataset.idx);
                if (confirm('Remover?')) {
                    weekData[day].tasks.splice(idx, 1);
                    saveData();
                    renderGrid();
                }
            };
        });
        document.querySelectorAll('[data-hours]').forEach(btn => {
            btn.onclick = () => {
                let day = btn.dataset.day, idx = parseInt(btn.dataset.idx);
                let hours = parseFloat(btn.dataset.hours);
                weekData[day].tasks[idx].hours += hours;
                saveData();
                renderGrid();
                updateRanking();
            };
        });
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.onclick = () => {
                let day = btn.dataset.day;
                let name = prompt('Nome da matéria:');
                if (name) {
                    weekData[day].tasks.push({
                        name, duration: "1h✨", badge: "Média",
                        completed: false, topic: "", hours: 0
                    });
                    saveData();
                    renderGrid();
                }
            };
        });
        document.querySelectorAll('.topic').forEach(topic => {
            topic.onclick = function() {
                let day = this.dataset.day, idx = parseInt(this.dataset.idx);
                let input = document.createElement('input');
                input.value = weekData[day].tasks[idx].topic || '';
                input.style.width = '100%';
                input.style.padding = '4px';
                input.style.borderRadius = '8px';
                input.style.background = '#333';
                input.style.color = 'white';
                input.style.border = 'none';
                this.replaceWith(input);
                input.focus();
                input.onblur = () => {
                    weekData[day].tasks[idx].topic = input.value;
                    saveData();
                    renderGrid();
                };
            };
        });
    }

    function updateStats() {
        let today = new Date().getDay();
        let map = {0:'dom',1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:'sab'};
        let todayKey = map[today];
        let todayHours = 0, weekHours = 0, totalTasks = 0, completedTasks = 0;
        for (let [day, data] of Object.entries(weekData)) {
            for (let task of data.tasks) {
                weekHours += task.hours;
                if (day === todayKey) todayHours += task.hours;
                totalTasks++;
                if (task.completed) completedTasks++;
            }
        }
        document.getElementById('weeklyTime').innerHTML = weekHours.toFixed(1) + 'h';
        document.getElementById('todayTime').innerHTML = todayHours.toFixed(1) + 'h';
        let percent = totalTasks ? Math.round(completedTasks / totalTasks * 100) : 0;
        document.getElementById('weeklyProgress').innerHTML = percent + '%';
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        timerInterval = setInterval(() => {
            timerSeconds++;
            let h = Math.floor(timerSeconds/3600);
            let m = Math.floor((timerSeconds%3600)/60);
            let s = timerSeconds%60;
            document.getElementById('timer').innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (currentDay !== null && currentTaskIdx !== null) {
                weekData[currentDay].tasks[currentTaskIdx].hours += 1/3600;
                saveData();
                updateStats();
                updateRanking();
                renderGrid();
            }
        }, 1000);
    }

    function pauseTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
        }
    }

    function resetTimer() {
        pauseTimer();
        timerSeconds = 0;
        document.getElementById('timer').innerHTML = '00:00:00';
    }

    function resetWeek() {
        if (confirm('Resetar tudo?')) {
            for (let day in weekData) {
                for (let task of weekData[day].tasks) {
                    task.completed = false;
                    task.hours = 0;
                }
            }
            saveData();
            renderGrid();
            updateRanking();
        }
    }

    function login() {
        let name = document.getElementById('userName').value.trim();
        if (!name) return alert('Digite seu nome');
        currentUser = name;
        document.getElementById('userDisplay').innerHTML = `👤 ${name}`;
        document.getElementById('rankingArea').style.display = 'block';
        if (!loadData()) {
            weekData = initWeekData();
            saveData();
        }
        renderGrid();
        updateRanking();
        setInterval(() => { if (currentUser) updateRanking(); }, 3000);
    }

    document.getElementById('loginBtn').onclick = login;
    document.getElementById('startTimer').onclick = startTimer;
    document.getElementById('pauseTimer').onclick = pauseTimer;
    document.getElementById('resetTimer').onclick = resetTimer;
    document.getElementById('resetWeek').onclick = resetWeek;

    let lastUser = localStorage.getItem('lastUser');
    if (lastUser) {
        document.getElementById('userName').value = lastUser;
        login();
    }
    window.onload = () => {
        if (currentUser) {
            updateRanking();
        }
    };
</script>
</body>
</html>
